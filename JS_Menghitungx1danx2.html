<!DOCTYPE html>
<html>
<head>
    <title>Mencari Akar Persamaan Kuadrat</title>
</head>
<body>

<h3>Program Akar Persamaan Kuadrat</h3>

<script>
    // Input nilai a, b, c
    let a = parseFloat(prompt("Masukkan nilai a:"));
    let b = parseFloat(prompt("Masukkan nilai b:"));
    let c = parseFloat(prompt("Masukkan nilai c:"));

    // Menghitung diskriminan
    let D = b * b - 4 * a * c;

    let x1, x2;

    if (D > 0) {
        x1 = (-b + Math.sqrt(D)) / (2 * a);
        x2 = (-b - Math.sqrt(D)) / (2 * a);
        alert("Akar berbeda:\nx1 = " + x1 + "\nx2 = " + x2);
    } else if (D == 0) {
        x1 = -b / (2 * a);
        alert("Akar kembar:\nx1 = x2 = " + x1);
    } else {
        alert("Akar imajiner (tidak real)");
    }
</script>

</body>
</html>
