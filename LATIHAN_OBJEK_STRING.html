<!DOCTYPE html>

<body bgcolor="lightblue">

  <h2>Latihan Objek String</h2>

  <script type="text/javascript">
    // Inisialisasi variabel nama awal
    var nama = "Shafana Vevica";

    // 1. Tampilkan nama asli
    document.write("Namaku adalah = " + nama + "<br>");

    // 2. Panjang karakter menggunakan .length
    document.write("Panjang namaku adalah " + nama.length + " karakter<br>");

    // 3. Method BIG (menggunakan .big() atau <big>)
    document.write("method BIG = " + nama.big() + "<br>");

    // 4. Method SMALL (menggunakan .small() atau <small>)
    document.write("method SMALL = " + nama.small() + "<br>");

    // 5. Method SUB (Subscript)
    document.write("method SUB = " + nama.sub() + "<br>");

    // 6. Method SUP (Superscript)
    document.write("method SUP = " + nama.sup() + "<br>");

    // 7. Method BOLD
    document.write("method BOLD = " + nama.bold() + "<br>");

    // 8. Method ITALIC
    document.write("method ITALIC = " + nama.italics() + "<br>");

    // 9. Method FONTCOLOR (warna merah)
    document.write("method FONTCOLOR = " + nama.fontcolor("red") + "<br>");

    // 10. Method LOWERCASE
    document.write("method LOWERCASE = " + nama.toLowerCase() + "<br>");

    // 11. Method UPPERCASE
    document.write("method UPPERCASE = " + nama.toUpperCase() + "<br>");

    // 12. Method SUBSTRING (mengambil kata 'haf' dari indeks 1 sampai 4)
    document.write("method SUBSTRING = " + nama.substring(1, 4) + "<br>");

    // 13. Method STRIKE (Coret tengah)
    document.write("method STRIKE = " + nama.strike() + "<br>");

    // 14. Method CharAT (Mengambil karakter di indeks tertentu, misal indeks 1 adalah 'h')
    // Catatan: Di gambar tertulis 'f', sesuaikan indeksnya agar menghasilkan huruf 'f' (indeks 3)
    document.write("method CharAT = " + nama.charAt(3) + "<br>");

    // 15. Method Link
    document.write("method Link = " + nama.link("#") + "<br>");

    // 16. Index Huruf c (Mencari posisi huruf 'c')
    document.write("Index Huruf c = " + nama.indexOf("c") + "<br>");

    // 17. Kata Yang Tersisa (Mengambil potongan kata dari indeks 8 hingga akhir)
    document.write("Kata Yang Tersisa = " + nama.substring(8) + "<br>");
  </script>

</body>
</html>
