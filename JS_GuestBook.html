        function isiform(form)
        {
            isinama(form);
            isiemail(form);

            kosongkan(form);
        }
        function kosongkan(form)
        {
            if ((isinama(form) && isiemail(form) && isikomentar(form)))
            {
                form.submit;
            }
            if ((isinama(form) == false || isiemail (form) == false || 
            isikomentar(form) == false))
            {
                salahisi(form);
            }
        }
        function salahisi(form)
        {
           var teks = "Ada Kesalhan Isian :";

           {teks +="\nNama Anda";}
           if (isiemail(form) == false)
            {teks += "\nEmail Anda";}
           if (isikomentar(form) == false)
           {teks += "\nKomentar Anda";}
           alert(teks);
        }
        function isinama(form)
        {
            if (form.nama.value == "") 
                {
                    return false;
                }
            else
                {
                    return true;
                }
        }
        function isiemail(form)
        {
            if (form.email.value == "" || form.email.value.indexOf('@',0) == -1 || form.email.value.indexOf('.') == -1)
                { return false;}
            else
                { return true;}
        }
        function isikomentar(form)
        {
            if (form.cs.value == "")
            { return false;}
            else
            { return true;}
        }
