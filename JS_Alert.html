<!DOCTYPE html>
<html>
<head>
    <title>Ucapan Waktu</title>
</head>
<body>

<marquee id="teks"></marquee>

<script>
    let sekarang = new Date();
    let jam = sekarang.getHours();
    let ucapan = "";

    if (jam >= 5 && jam < 11) {
        ucapan = "Selamat Pagi";
    } else if (jam >= 11 && jam < 15) {
        ucapan = "Selamat Siang";
    } else if (jam >= 15 && jam < 18) {
        ucapan = "Selamat Sore";
    } else {
        ucapan = "Selamat Malam";
    }

    document.getElementById("teks").innerHTML = ucapan + " !!!!!";
</script>

</body>
</html>
